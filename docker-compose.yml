services:
  omniagent-swarm:
    image: ghcr.io/parag8487/omniagent-swarm:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/parag8487/omniagent-swarm:latest
    container_name: omniagent-swarm
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads